name: Build

on:
  - push
  - pull_request
  - workflow_dispatch

permissions:
  contents: write

jobs:
  code-quality:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r .github/requirements.txt
      - name: Run black
        run: black . --check
      - name: Setup flake8 annotations
        uses: rbialon/flake8-annotations@v1

  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install node
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          registry-url: "https://registry.npmjs.org"

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install twine wheel jupyter-packaging "jupyterlab<5"

      - name: Build
        run: |
          python setup.py sdist bdist_wheel

      - name: Build
        run: |
          cd js
          npm pack

      - name: Check number of files in wheel
        run: |
          wheel=(dist/*.whl)
          unzip -d count ${wheel}
          ls -1 count
          if [[ $(ls -1 count | wc -l) -ne 3 ]]; then echo "Expected 4 files/directory"; exit 1; fi

      - name: Upload builds
        uses: actions/upload-artifact@v4
        with:
          name: ipyvue-dist-${{ github.run_number }}
          path: |
            ./dist
            ./js/*.tgz

  test:
    needs: [build]
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version: [3.8, 3.9, "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: ipyvue-dist-${{ github.run_number }}

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r .github/requirements.txt

      - name: Install
        run: pip install dist/*.whl

      - name: test with pytest
        run: coverage run -m pytest --color=yes tests/unit

      - name: Import
        # do the import in a subdirectory, as after installation, files in de current directory are also imported
        run: |
          (mkdir test-install; cd test-install; python -c "from ipyvue import Html")

  ui-test:
    needs: [build]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: ipyvue-dist-${{ github.run_number }}

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.8

      - name: Install vuetify and test deps
        run: |
          wheel=(dist/*.whl)
          pip install ${wheel} https://github.com/widgetti/ipyvuetify/archive/refs/heads/vuetify3.zip ${wheel}[test] "jupyter_server<2"

      - name: Install playwright browsers
        run: playwright install chromium

      - name: Run ui-tests
        run: pytest tests/ui/ --video=retain-on-failure --solara-update-snapshots-ci -s

      - name: Upload Test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ipyvue-test-results
          path: test-results

  release-vue3-dev:
    if: github.event_name == 'push' && github.ref == 'refs/heads/vue3'
    needs: [test, ui-test, code-quality]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ipyvue-dist-${{ github.run_number }}

      - name: Create or update vue3-dev release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view vue3-dev --repo "${{ github.repository }}" || gh release create vue3-dev --repo "${{ github.repository }}" --title "vue3-dev" --notes "Auto-updated Vue 3 dev builds" --prerelease --target "${{ github.sha }}"
          gh release upload vue3-dev dist/*.whl js/*.tgz --repo "${{ github.repository }}" --clobber

  release:
    if: startsWith(github.event.ref, 'refs/tags/v')
    needs: [test,ui-test,code-quality]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ipyvue-dist-${{ github.run_number }}

      - name: Install node
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          registry-url: "https://registry.npmjs.org"

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install twine wheel jupyter-packaging jupyterlab

      - name: Publish the Python package
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload --skip-existing dist/*

      - name: Publish the NPM package
        run: |
          cd js
          echo $PRE_RELEASE
          if [[ $PRE_RELEASE == "true" ]]; then export TAG="next"; else export TAG="latest"; fi
          npm publish --tag ${TAG} --access public *.tgz
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          PRE_RELEASE: ${{ github.event.release.prerelease }}
